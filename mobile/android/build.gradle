buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.0")
    }
}

// ✅ FIXED: Moved subprojects OUTSIDE buildscript block to root level
subprojects {
    beforeEvaluate { project ->
        // Gradle 9+ compatibility patch: Apply com.android.library to all dependency libraries before they evaluate
        if (project.name != 'app' && (
            project.name.contains('firebase') || 
            project.name.contains('notifee') || 
            project.name.contains('react-native') || 
            project.name.contains('async-storage') || 
            project.name.contains('safe-area-context') || 
            project.name.contains('screens')
        )) {
            if (!project.plugins.hasPlugin('com.android.library') && !project.plugins.hasPlugin('com.android.application')) {
                project.plugins.apply('com.android.library')
            }
        }
    }

    afterEvaluate { project ->
        // Kuch libraries 'android' keyword use karti hain, par plugin missing hota hai, usse crash rokne ke liye:
        if (project.extensions.findByName("android") != null) {
            project.android {
                // ✅ FIXED: Modern Gradle compilation enforcement syntax
                compileSdk = rootProject.ext.compileSdkVersion
                buildToolsVersion = rootProject.ext.buildToolsVersion
                
                defaultConfig {
                    minSdk = rootProject.ext.minSdkVersion
                    targetSdk = rootProject.ext.targetSdkVersion
                }
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"